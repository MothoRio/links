<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>HTML 2000</title>
        <link rel="stylesheet" href="animation.css">
    </head>
    <body>
        <p id="text" class="fade">表示テキスト</p>

        <style>
        .fade {
            transition: opacity 1s;
        }
        </style>

        <script>
        const texts = [
            "こんにちは！", "お元気ですか？", "今日はいい天気ですね。",
            "楽しい一日を！", "プログラミングは面白い！", "目標を持とう！",
            "休憩も大事です。", "新しいことに挑戦しよう！", "笑顔を忘れずに！",
            "また会いましょう！"
        ];

        let index = 0;
        const textElement = document.getElementById("text");

        setInterval(() => {
            textElement.style.opacity = 0; // フェードアウト
            setTimeout(() => {
            textElement.textContent = texts[index]; // テキスト変更
            textElement.style.opacity = 1; // フェードイン
            index = (index + 1) % texts.length;
            }, 1000); // 1秒後に変更
        }, 3000);
        </script>
    </body>
</html>
