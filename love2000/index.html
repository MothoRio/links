<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>HTML 2000</title>
        <link rel="stylesheet" href="animation.css">
    </head>
    <body>
        <p id="text" class="fade">表示テキスト</p>

        <style>
        .fade {
            transition: opacity 1s;
        }
        </style>

        <script>
            const texts = [
                "愛はどこからやってくるのでしょう", "自分の胸に問いかけた", "食べてみなくちゃ分からない事",
                "出会いの引力はどれほどか", "愛はどこからやってくるのでしょう", "自分の胸に問いかけた",
                "ニセモノなんか興味はないワ", "ホンモノだけ見つけたい", "あなたをずっと探してた",
            ];

            let index = 0;
            const textElement = document.getElementById("text");

            setInterval(() => {
                textElement.style.opacity = 0; // フェードアウト
                setTimeout(() => {
                textElement.textContent = texts[index]; // テキスト変更
                textElement.style.opacity = 1; // フェードイン
                index = (index + 1) % texts.length;
                }, 5700); // 1秒後に変更
            }, 3000);
        </script>
    </body>
</html>
